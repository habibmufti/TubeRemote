name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Builds Linux (CGO+GTK) + Windows (CGO_ENABLED=0) + .deb/.rpm, creates the GitHub release
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install GTK libs for Linux systray
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libgtk-3-dev libayatana-appindicator3-dev

      - name: Build web assets
        run: cd web && bun install && bun run build

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: ~> v2
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Package the Chrome extension: sync its manifest version to the tag, zip it
      # with the tuberemote-extension/ folder the README tells users to load,
      # add its hash to SHA256SUMS.txt, and attach it to the release.
      - name: Package and upload Chrome extension
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          # Sync manifest version to the release tag
          tmp=$(mktemp)
          jq --arg v "$VERSION" '.version = $v' extension/manifest.json > "$tmp"
          mv "$tmp" extension/manifest.json

          # Zip with the wrapping folder users select via "Load unpacked"
          cp -r extension tuberemote-extension
          zip -r tuberemote-extension.zip tuberemote-extension

          # Append the extension hash to the release's SHA256SUMS.txt
          gh release download "$GITHUB_REF_NAME" -p SHA256SUMS.txt -O SHA256SUMS.txt
          sha256sum tuberemote-extension.zip >> SHA256SUMS.txt

          gh release upload "$GITHUB_REF_NAME" \
            tuberemote-extension.zip \
            SHA256SUMS.txt --clobber

  # Builds macOS binaries with native CGO (Cocoa/systray), creates .pkg installers
  build-macos:
    needs: goreleaser
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Get version
        id: ver
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build web assets
        run: cd web && bun install && bun run build

      - name: Build macOS binaries
        env:
          VERSION: ${{ steps.ver.outputs.VERSION }}
        run: |
          # arm64 — native on macos-latest (Apple Silicon runner)
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=1 \
            go build -ldflags "-s -w -X main.version=${VERSION}" \
            -o tuberemote-darwin-arm64 .

          # amd64 — cross-compile from arm64 runner
          GOOS=darwin GOARCH=amd64 CGO_ENABLED=1 \
            CGO_CFLAGS="-arch x86_64" CGO_LDFLAGS="-arch x86_64" \
            go build -ldflags "-s -w -X main.version=${VERSION}" \
            -o tuberemote-darwin-amd64 .

      - name: Upload macOS binaries to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            tuberemote-darwin-amd64 \
            tuberemote-darwin-arm64

      - name: Build and upload macOS pkg installers
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.ver.outputs.VERSION }}
        run: |
          chmod +x installers/macos/build-pkg.sh
          for arch in amd64 arm64; do
            bash installers/macos/build-pkg.sh \
              "tuberemote-darwin-${arch}" \
              "$VERSION" \
              "$arch" \
              "tuberemote-macos-${arch}.pkg"
            gh release upload "${{ github.ref_name }}" \
              "tuberemote-macos-${arch}.pkg"
          done

  # Builds Windows NSIS installer from the binary uploaded by goreleaser
  installer-windows:
    needs: goreleaser
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: ver
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download Windows binary
        shell: bash
        run: |
          curl -fsSL -o installers/windows/tuberemote.exe \
            "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/tuberemote-windows-amd64.exe"

      - name: Install NSIS and build installer
        shell: pwsh
        run: |
          choco install nsis -y
          $env:PATH += ";C:\Program Files (x86)\NSIS"
          Set-Location installers\windows
          makensis /DVERSION=${{ steps.ver.outputs.VERSION }} setup.nsi

      - name: Upload installer to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            "installers/windows/tuberemote-windows-setup.exe"
