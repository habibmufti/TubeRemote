version: 2

project_name: tuberemote

before:
  hooks:
    - go mod tidy
    - make web

builds:
  # Linux: CGO required for systray (GTK)
  - id: linux
    main: .
    binary: tuberemote
    goos: [linux]
    goarch: [amd64]
    env:
      - CGO_ENABLED=1
    ldflags:
      - -s -w -X main.version={{.Version}}

  # Windows: systray is pure Win32, no CGO needed
  - id: windows
    main: .
    binary: tuberemote
    goos: [windows]
    goarch: [amd64]
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: binaries
    builds: [linux, windows]
    format: binary
    name_template: "{{ .Binary }}-{{ .Os }}-{{ .Arch }}"

nfpms:
  - id: linux-packages
    builds: [linux]
    package_name: tuberemote
    homepage: https://github.com/habibmufti/TubeRemote
    description: Remote control YouTube from your phone via a Chrome extension.
    maintainer: Habib Mufti
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/local/bin
    file_name_template: "{{ .PackageName }}-linux-{{ .Arch }}"

checksum:
  name_template: "SHA256SUMS.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: habibmufti
    name: TubeRemote
  draft: false
  prerelease: auto
