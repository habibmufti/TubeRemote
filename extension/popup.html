<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TubeRemote</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0c0c0f;
      --surface: #131318;
      --surface2: #1b1b22;
      --border:  #252530;
      --border2: #32323f;
      --text:    #eeeef2;
      --muted:   #6b6b78;
      --red:     #e8001e;
      --red-dim: rgba(232, 0, 30, 0.1);
      --green:   #00d26a;
      --radius:  10px;
    }

    body {
      width: 260px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 14px 14px 12px;
      border-bottom: 1px solid var(--border);
    }

    .logo-mark {
      width: 26px;
      height: 26px;
      background: var(--red);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-mark svg { width: 14px; height: 14px; fill: #fff; }

    .logo-name {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    /* ── Status row ── */
    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--muted);
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--border2);
      flex-shrink: 0;
      transition: background 0.3s, box-shadow 0.3s;
    }

    .dot.on {
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
    }

    .dot.red {
      background: var(--red);
      box-shadow: 0 0 6px var(--red);
    }

    /* ── QR area ── */
    .qr-section {
      padding: 16px 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .qr-wrap {
      width: 188px;
      height: 188px;
      background: #fff;
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .qr-wrap img {
      width: 100%;
      height: 100%;
      display: block;
    }

    .qr-hint {
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      line-height: 1.55;
    }

    .phone-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 10px;
      font-size: 11px;
      color: var(--muted);
      font-weight: 500;
    }

    .phone-pill.connected { color: var(--green); border-color: rgba(0,210,106,0.25); }
    .phone-pill.connected .dot { background: var(--green); box-shadow: 0 0 5px var(--green); }

    /* ── Offline ── */
    .offline-section {
      padding: 20px 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      text-align: center;
    }

    .offline-icon {
      width: 44px;
      height: 44px;
      background: var(--red-dim);
      border: 1px solid rgba(232,0,30,0.2);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .offline-icon svg { width: 22px; height: 22px; fill: var(--red); }

    .offline-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    .offline-sub {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.5;
    }

    .retry-btn {
      cursor: pointer;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font: inherit;
      font-size: 12px;
      font-weight: 600;
      border-radius: 7px;
      padding: 7px 16px;
      margin-top: 2px;
      transition: background 0.12s;
    }

    .retry-btn:hover { background: var(--border); }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </div>
    <span class="logo-name">TubeRemote</span>
  </div>

  <div class="status-row">
    <div class="status-item">
      <div class="dot" id="binary-dot"></div>
      <span id="binary-label">Binary</span>
    </div>
    <div class="status-item">
      <div class="dot" id="phone-dot"></div>
      <span id="phone-label">Phone</span>
    </div>
  </div>

  <div id="qr-section" class="qr-section" style="display:none">
    <div class="qr-wrap">
      <img id="qr-img" alt="QR Code" />
    </div>
    <p class="qr-hint">Scan with your phone<br>on the same network</p>
    <div class="phone-pill" id="phone-pill">
      <div class="dot" id="pill-dot"></div>
      <span id="pill-label">Phone not connected</span>
    </div>
  </div>

  <div id="offline-section" class="offline-section" style="display:none">
    <div class="offline-icon">
      <svg viewBox="0 0 24 24"><path d="M19.59 7 12 14.59 6.41 9H11V7H3v8h2v-4.59l7 7 9-8.91z"/></svg>
    </div>
    <div class="offline-title">Binary not running</div>
    <div class="offline-sub">Run <strong>tuberemote.exe</strong><br>then click Retry</div>
    <button class="retry-btn" onclick="retry()">Retry</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
